<body>
  <div id="app"></div>
  <script>
var BL = 60; // baseline Y
var s = (v) => Math.max(18, Math.min(102, v)); // safe clamp

// Cubic Bézier arc: smooth hill/valley through (x0,y0) → peak (xp,yp) → (x1,y1)
var arc = (x0,y0,xp,yp,x1,y1) => {
  var cp = 0.52; // control point tension
  return `C ${x0+(xp-x0)*cp} ${y0},${xp-(x1-x0)*0.14} ${yp},${xp} ${yp} C ${xp+(x1-xp)*0.14} ${yp},${x1-(xp-x0)*cp} ${y1},${x1} ${y1} `;
};

// ── Primitives ──────────────────────────────────────────────────────────────

// P wave: smooth bell, width ~18px
var P  = (x, h=9)  => `L ${x} ${BL} ` + arc(x,BL, x+9,s(BL-h), x+18,BL);
// Inverted P (retrograde)
var Pi = (x, h=7)  => `L ${x} ${BL} ` + arc(x,BL, x+9,s(BL+h), x+18,BL);
// Isoelectric segment
var iso = (x, len=20, dy=0) => `L ${x} ${s(BL+dy)} L ${x+len} ${s(BL+dy)} `;

// Normal narrow QRS (~18px wide): tiny Q → tall R → small S
var QRS = (x, r=32, q=4, ss=6) =>
  `L ${x} ${BL} L ${x+3} ${s(BL+q)} L ${x+8} ${s(BL-r)} L ${x+14} ${s(BL+ss)} L ${x+18} ${BL} `;

// Wide QRS (~32px): slurred broad deflection
var wQRS = (x, r=28, inv=false) => {
  var d = inv ? -1 : 1;
  return `L ${x} ${BL} L ${x+5} ${s(BL+6*d)} L ${x+14} ${s(BL-r*d)} L ${x+24} ${s(BL+8*d)} L ${x+32} ${BL} `;
};

// RBBB: rSR' (rabbit ears) ~26px
var rbbbQRS = (x) => {
  var r1=s(BL-24), sv=s(BL+7), r2=s(BL-18);
  return `L ${x} ${BL} ` +
    arc(x,BL, x+5,r1, x+9,s(BL-6)) +
    `L ${x+11} ${sv} ` +
    arc(x+11,sv, x+16,r2, x+20,s(BL-4)) +
    `L ${x+24} ${BL} `;
};

// LBBB: broad monophasic R, no Q, ~28px
var lbbbQRS = (x) => {
  // BBG : R large encochée (2 bosses) + QRS large + pas de Q
  var pk1 = s(BL-20), pk2 = s(BL-30);
  return `L ${x} ${BL} `
    + arc(x, BL, x+7, pk1, x+12, pk1)
    + `L ${x+14} ${s(BL-22)} `
    + arc(x+14, s(BL-22), x+19, pk2, x+24, pk2)
    + arc(x+24, pk2, x+30, BL, x+32, BL);
};

// WPW: delta slope then R spike then S ~26px
var wpwQRS = (x) => {
  // Onde delta : montée LENTE et progressive avant le pic R (PR court + pré-excitation)
  // PR court visible, puis delta (rampe de 12px), puis QRS élargi
  var yDelta = s(BL-14), yR = s(BL-30), yS = s(BL+8);
  return `L ${x} ${BL} `
    // Onde delta : montée progressive sur 12px (rampe caractéristique)
    + `L ${x+4} ${s(BL-5)} L ${x+8} ${s(BL-12)} L ${x+12} ${yDelta} `
    // Pic R
    + `L ${x+16} ${yR} `
    // Descente S
    + `L ${x+22} ${yS} L ${x+27} ${BL} `;
};

// T wave: smooth bell, width ~28px
var T  = (x, h=13, neg=false) => arc(x,BL, x+14,s(BL+(neg?h:-h)), x+28,BL);
// ST segment (flat, elevated +, depressed -)
var ST = (x, len=20, elev=0)  => `L ${x} ${s(BL-elev)} L ${x+len} ${s(BL-elev)} `;

// ── Full Rhythm Generators ───────────────────────────────────────────────────
// Each returns a path string for viewBox "0 0 800 120"

var ECG_SHAPES = {

  sinus: (rr=180) => {
    let d=`M 0 ${BL}`, x=0;
    while(x<800){ d+=P(x)+iso(x+18,20)+QRS(x+38)+ST(x+56,18)+T(x+74)+`L ${Math.min(x+rr,800)} ${BL} `; x+=rr; }
    return d;
  },

  tachy_sinus: () => {
    let d=`M 0 ${BL}`, x=0;
    while(x<800){ d+=P(x,10)+iso(x+18,10)+QRS(x+28,30)+ST(x+46,8)+T(x+54,12)+`L ${Math.min(x+106,800)} ${BL} `; x+=106; }
    return d;
  },

  brady_sinus: () => {
    let d=`M 0 ${BL}`, x=0;
    while(x<800){ d+=P(x)+iso(x+18,20)+QRS(x+38)+ST(x+56,22)+T(x+78)+`L ${Math.min(x+268,800)} ${BL} `; x+=268; }
    return d;
  },

  fa: () => {
    var rrs=[70,58,88,74,62,72,56,80,66,84,61];
    let d=`M 0 ${BL}`, x=0, ci=0;
    while(x<800){
      var rr=rrs[ci%rrs.length];
      // fibrillatory baseline with small irregular humps
      for(let i=0;i<rr-24;i+=6){
        var ny=BL+Math.sin(x*0.6+i*1.3)*3.5+Math.cos(x*1.2+i*0.7)*2;
        d+=`L ${x+i} ${s(ny,52,68)} `;
      }
      d+=QRS(x+rr-20,32,4,6)+`L ${Math.min(x+rr,800)} ${BL} `;
      x+=rr; ci++;
    }
    return d;
  },

  flutter: () => {
    let d=`M 0 ${BL}`, x=0;
    while(x<800){
      // 4 flutter waves (sawtooth via Bézier)
      for(let i=0;i<4;i++){
        var fx=x+i*22;
        d+=`L ${fx} ${BL} `+arc(fx,BL, fx+11,s(BL-12), fx+21,s(BL+6));
      }
      d+=QRS(x+88,32,3,5)+`L ${Math.min(x+186,800)} ${BL} `; x+=186;
    }
    return d;
  },

  bav1: () => {
    let d=`M 0 ${BL}`, x=0;
    // PR = ~50ms (very long)
    while(x<800){ d+=P(x)+iso(x+18,38)+QRS(x+56)+ST(x+74,20)+T(x+94)+`L ${Math.min(x+194,800)} ${BL} `; x+=194; }
    return d;
  },

  bav2m1: () => {
    // Wenckebach: PR progressively longer, then dropped beat
    let d=`M 0 ${BL}`, x=0;
    while(x<800){
      var prs=[18,26,36]; // increasing PR
      for(var pr of prs){
        if(x>=800) break;
        d+=P(x)+iso(x+18,pr)+QRS(x+18+pr)+ST(x+36+pr,18)+T(x+54+pr)+`L ${Math.min(x+pr+105,800)} ${BL} `;
        x+=pr+105;
      }
      if(x>=800) break;
      // blocked P — no QRS
      d+=P(x)+`L ${Math.min(x+115,800)} ${BL} `; x+=115;
    }
    return d;
  },

  bav2m2: () => {
    // Mobitz II: constant PR, sudden dropped beat
    let d=`M 0 ${BL}`, x=0;
    while(x<800){
      for(let i=0;i<3;i++){
        if(x>=800) break;
        d+=P(x)+iso(x+18,22)+QRS(x+40)+ST(x+58,18)+T(x+76)+`L ${Math.min(x+148,800)} ${BL} `; x+=148;
      }
      if(x>=800) break;
      d+=P(x)+`L ${Math.min(x+118,800)} ${BL} `; x+=118;
    }
    return d;
  },

  bav3: () => {
    // Complete AV block: P at 88px, escape QRS at 160px, fully independent
    let d=`M 0 ${BL} `;
    var pPos =[10,98,186,274,362,450,538,626,714];
    var qPos =[80,240,400,560,720];
    var all=[...pPos.map(p=>({x:p,t:'p'})),...qPos.map(q=>({x:q,t:'q'}))].sort((a,b)=>a.x-b.x);
    for(var ev of all){
      d+=`L ${ev.x} ${BL} `;
      if(ev.t==='p') d+=P(ev.x,8).replace(`L ${ev.x} ${BL} `,'');
      else d+=wQRS(ev.x,24)+ST(ev.x+32,16)+T(ev.x+48,11);
    }
    return d+`L 800 ${BL} `;
  },

  vt: () => {
    let d=`M 0 ${BL}`, x=0;
    while(x<800){ d+=`L ${x} ${BL} `+wQRS(x,26)+T(x+32,12,true)+`L ${Math.min(x+64,800)} ${BL} `; x+=64; }
    return d;
  },

  vf: () => {
    var amps=[22,-26,18,-22,28,-17,24,-30,19,-23,26,-20,30,-24];
    let d=`M 0 ${BL}`, x=0, ai=0;
    while(x<800){
      var w=13+(ai%4)*3, a=amps[ai%amps.length];
      d+=arc(x,BL, x+w/2,s(BL+a), x+w,BL); x+=w; ai++;
    }
    return d;
  },

  wpw: () => {
    let d=`M 0 ${BL}`, x=0;
    while(x<800){ d+=P(x)+iso(x+18,8)+wpwQRS(x+26)+T(x+52,13,true)+`L ${Math.min(x+172,800)} ${BL} `; x+=172; }
    return d;

    // Small epsilon wave just after widened QRS (ARVC)
    let d=`M 0 ${BL}`, x=0;
    while(x<800){

      d+=`L ${x+56} ${BL} `+arc(x+56,BL, x+62,s(BL-7), x+68,BL)+T(x+68,12,true)+`L ${Math.min(x+202,800)} ${BL} `;
      x+=202;
    }
    return d;
  },

  hypertrophie_vg: () => {
    // Very tall R, LV strain (ST depression + T inversion)
    let d=`M 0 ${BL}`, x=0;
    while(x<800){
      d+=P(x,13)+iso(x+18,20);
      d+=`L ${x+38} ${BL} L ${x+41} ${s(BL+4)} L ${x+44} ${s(BL-42)} L ${x+50} ${s(BL+8)} L ${x+55} ${BL} `;

    while(x<800){

      d+=`L ${x+36} ${BL} L ${x+39} ${s(BL+3)} L ${x+42} ${s(BL-34)} L ${x+47} ${s(BL+5)} L ${x+51} ${BL} `;

    // rS pattern (DII): small r then deep S, left axis deviation
    let d=`M 0 ${BL}`, x=0;
    while(x<800){
      d+=P(x)+iso(x+18,18);

    }
    return d;
  },

  hbpg: () => {
    // qR pattern: deep Q then tall R (right axis deviation)
    let d=`M 0 ${BL}`, x=0;
    while(x<800){
      d+=P(x)+iso(x+18,18);
      d+=`L ${x+36} ${BL} L ${x+39} ${s(BL+16)} L ${x+43} ${s(BL-28)} L ${x+49} ${s(BL+6)} L ${x+54} ${BL} `;

    }

  onde_p_biventriculaire: () => {
    // Bifid P wave (double hump = left atrial enlargement)
    let d=`M 0 ${BL}`, x=0;
    while(x<800){
      d+=`L ${x} ${BL} `+arc(x,BL, x+7,s(BL-9), x+13,BL)+arc(x+13,BL, x+20,s(BL-7), x+27,BL);

  },

  onde_p_pulmonale: () => {
    // Tall narrow P (right atrial enlargement)
    let d=`M 0 ${BL}`, x=0;
    while(x<800){
      d+=`L ${x} ${BL} L ${x+5} ${s(BL-20)} L ${x+11} ${BL} `+iso(x+11,14)+QRS(x+25)+ST(x+43,20)+T(x+63,11)+`L ${Math.min(x+166,800)} ${BL} `;
      x+=166;
    }

  rythme_av_dissociation: () => {
    var pPos=[8,92,176,260,344,428,512,596,680,764];
    var qPos=[55,178,301,424,547,670];
    var all=[...pPos.map(p=>({x:p,t:'p'})),...qPos.map(q=>({x:q,t:'q'}))].sort((a,b)=>a.x-b.x);
    let d=`M 0 ${BL} `;
    for(var ev of all){
      d+=`L ${ev.x} ${BL} `;
      if(ev.t==='p') d+=P(ev.x,7).replace(`L ${ev.x} ${BL} `,'');

  ddp: () => {

    }

  },

function getAnnotations(shape) {
  return ECG_ANNOTATIONS[shape] || [];
}

function renderAnnotations(shape, uid) {
  var anns = getAnnotations(shape);
  if (!anns.length) return '';
  var parts = [];
  anns.forEach(function(a, i) {
    var lw = Math.min(a.label.length * 5.8 + 10, 200);
    // Keep label inside viewBox (0-800 width, 0-120 height)
    var lx = Math.min(a.x + 6, 800 - lw - 4);
    var ly = a.y - 10 < 0 ? a.y + 4 : a.y - 10;
    // Alternate above/below to avoid overlap
    if (i % 2 === 1 && a.y > 20) { ly = a.y + 4; }
    parts.push(
      // Line from dot to label
      '<line x1="' + a.x + '" y1="' + a.y + '" x2="' + (lx) + '" y2="' + (ly+7) + '" stroke="' + a.col + '" stroke-width="0.8" opacity="0.6"/>',
      // Dot
      '<circle cx="' + a.x + '" cy="' + a.y + '" r="2.5" fill="' + a.col + '" opacity="1"/>',
      // Label background
      '<rect x="' + lx + '" y="' + ly + '" width="' + lw + '" height="12" rx="2" fill="#120808" opacity="0.9" stroke="' + a.col + '" stroke-width="0.5"/>',
      // Label text
      '<text x="' + (lx+4) + '" y="' + (ly+9) + '" font-size="7.5" fill="' + a.col + '" font-family="monospace" font-weight="bold">' + a.label + '</text>'
    );
  });
  return parts.join('');
}

// ─── SPACED REPETITION ────────────────────────────────────────────────────────
var SR_KEY = "ecg_sr_v1";
var SR_INTERVALS = [0, 1, 3, 7, 14, 21];

function srLoad() {
  try { return JSON.parse(localStorage.getItem(SR_KEY) || "{}"); } catch(e) { return {}; }
}
function srSave(data) {
  try { localStorage.setItem(SR_KEY, JSON.stringify(data)); } catch(e) {}
}
function srUpdate(data, id, correct) {
  var now = Date.now();
  var e = data[id] || {level:0, attempts:0, correct:0};
  var next = {level:e.level, attempts:e.attempts+1, correct:e.correct+(correct?1:0)};
  next.level = correct ? Math.min(5, e.level+1) : Math.max(0, e.level-2);
  next.nextReview = now + SR_INTERVALS[next.level] * 86400000;
  var out = {};
  for(var k in data) out[k] = data[k];
  out[id] = next;
  return out;
}
function srQueue(cases, data) {
  var now = Date.now();
  var due=[], fresh=[], future=[];
  cases.forEach(function(c){
    if (!data[c.id]) fresh.push(c);
    else if (data[c.id].nextReview <= now) due.push(c);
    else future.push(c);
  });
  due.sort(function(a,b){ return ((data[a.id]&&data[a.id].level)||0)-((data[b.id]&&data[b.id].level)||0); });
  fresh.sort(function(){ return Math.random()-0.5; });
  future.sort(function(a,b){ return ((data[a.id]&&data[a.id].level)||0)-((data[b.id]&&data[b.id].level)||0); });
  return due.concat(fresh).concat(future);
}
function srStats(data, cases) {
  var mastered=0, learning=0, fresh=0, due=0;
  var byCat = {};
  var now = Date.now();
  cases.forEach(function(c) {
    if (!byCat[c.cat]) byCat[c.cat] = {attempts:0,correct:0,count:0,mastered:0,due:0};
    byCat[c.cat].count++;
    var e = data[c.id];
    if (!e) { fresh++; return; }
    if (e.level>=4) { mastered++; byCat[c.cat].mastered++; }
    else learning++;
    if (e.nextReview<=now) { due++; byCat[c.cat].due++; }
    byCat[c.cat].attempts += e.attempts;
    byCat[c.cat].correct  += e.correct;
  });
  return {mastered:mastered, learning:learning, fresh:fresh, due:due, total:cases.length, byCat:byCat};
}

var ficheState = {
  activeFiche: null,
  activeSection: null
};

function renderFiches() {
  var p = [];
  p.push('<div class="page fiches-page">');
  p.push('<div class="header">');
  p.push('<button id="homeBtnFiches" style="background:linear-gradient(135deg,#ff4060,#cc2040);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-family:inherit;cursor:pointer;border:none;font-weight:700;margin-bottom:16px;">⌂ Accueil</button>');
  p.push('<div class="header-sub">◈ FICHES CLINIQUES ◈</div>');
  p.push('<h1 style="font-size:32px">Référence</h1>');
  p.push('<div class="header-cats">Rythmo · Ischémie · Traitements · IC · HTA</div>');
  p.push('</div>');

  if (!ficheState.activeFiche) {
    // Grid of fiche cards
    p.push('<div class="fiche-grid">');
    FICHES.forEach(function(f) {
      p.push('<button class="fiche-card" data-fiche="'+f.id+'" style="border-color:'+f.couleur+'44;background:linear-gradient(135deg,#150a0a,#1e0f0f)">');
      p.push('<div class="fiche-icon">'+f.icon+'</div>');
      p.push('<div class="fiche-titre" style="color:'+f.couleur+'">'+f.titre+'</div>');
      p.push('<div class="fiche-count" style="color:#886050">'+f.sections.length+' sections</div>');
      p.push('</button>');
    });
    p.push('</div>');
  } else {
    // Show active fiche
    var fiche = FICHES.filter(function(f){ return f.id===ficheState.activeFiche; })[0];
    if (!fiche) { ficheState.activeFiche=null; return renderFiches(); }

    p.push('<div class="fiche-detail" style="width:100%;max-width:620px">');
    // Back button + title
    p.push('<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">');
    p.push('<button class="back-fiche-btn" id="backFicheBtn">← Retour</button>');
    p.push('<button id="homeBtnFiches" style="background:transparent;border:1px solid #ff406044;color:#ff4060;padding:6px 14px;border-radius:20px;font-size:12px;font-family:inherit;cursor:pointer;">⌂ Accueil</button>');
    p.push('<div style="font-size:20px;font-weight:900;color:'+fiche.couleur+'">'+fiche.icon+' '+fiche.titre+'</div>');
    p.push('</div>');

    // Section tabs
    p.push('<div class="fiche-tabs">');
    fiche.sections.forEach(function(s, si) {
      var active = ficheState.activeSection===si || (ficheState.activeSection===null && si===0);
      p.push('<button class="fiche-tab '+(active?'active':'')+'" data-section="'+si+'" style="'+(active?'border-color:'+fiche.couleur+';color:'+fiche.couleur+';background:'+fiche.couleur+'18':'')+'">'+s.titre+'</button>');
    });
    p.push('</div>');

    // Active section content
    var si = ficheState.activeSection===null ? 0 : ficheState.activeSection;
    var section = fiche.sections[si];
    if (section) {
      p.push('<div class="fiche-section-content">');
      section.contenu.forEach(function(item) {
        p.push('<div class="fiche-item">');
        if(item.ecg) p.push(miniECG(item.ecg));
        p.push('<div class="fiche-item-label" style="color:'+fiche.couleur+'">'+item.label+'</div>');
        if(item.table) {
          var tbl = item.table;
          var th = '<tr>' + tbl.headers.map(function(h){return '<th>'+h+'</th>';}).join('') + '</tr>';
          var tb = tbl.rows.map(function(r){return '<tr>'+r.map(function(c){return '<td>'+c+'</td>';}).join('')+'</tr>';}).join('');
          p.push('<table class="fiche-table"><thead>'+th+'</thead><tbody>'+tb+'</tbody></table>');
        }
        if(item.texte) p.push('<div class="fiche-item-texte">'+item.texte+'</div>');
        p.push('</div>');
      });
      p.push('</div>');
    }
    p.push('</div>');
  }
  p.push('</div>');
  return p.join('');
}

function bindFichesEvents() {
  var hbf = document.getElementById('homeBtnFiches');
  if(hbf) hbf.onclick = function(){ ficheState.activeFiche=null; state.screen='home'; render(); };
  document.querySelectorAll('.fiche-card').forEach(function(btn) {
    btn.onclick = function() {
      ficheState.activeFiche = btn.dataset.fiche;
      ficheState.activeSection = 0;
      state.screen = 'fiches';
      render();
    };
  });
  var backBtn = document.getElementById('backFicheBtn');
  if (backBtn) backBtn.onclick = function() {
    ficheState.activeFiche = null;
    ficheState.activeSection = null;
    render();
  };
  document.querySelectorAll('.fiche-tab').forEach(function(btn) {
    btn.onclick = function() {
      ficheState.activeSection = parseInt(btn.dataset.section);
      render();
    };
  });
}

function catKey(f) {

function getFiltered() {
  var fk = catKey(state.filter);
  return state.filter === "tous" ? ALL_CASES : ALL_CASES.filter(function(c){ return c.cat === fk; });
}

function navigate(screen) {
  state.screen = screen;
  render();
}

function shuffle(arr) {
  for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}
  return arr;
}

function startTextQuiz() {
  var pool = ALL_CASES.filter(function(c){ return c.type === 'text'; });
  state.queue = shuffle(pool.slice());
  state.current = state.queue[0] || null;
  state.selected = null;
  state.showResult = false;
  state.showHint = false;
  state.showKeys = false;
  state.score = {ok:0, total:0};
  state.history = [];
  state.screen = 'quiz';
  render();
}

function render() {
  var app = document.getElementById('app');
  if (state.screen === "home") {
    app.innerHTML = renderHome();
    var bf = document.getElementById('btnFiches');
    var bq = document.getElementById('btnQuiz');
    if(bf) bf.onclick = function(){ navigate('fiches'); };
    if(bq) bq.onclick = function(){ startQuiz(); };
  }
  else if (state.screen === "quiz") app.innerHTML = renderQuiz();
  else if (state.screen === "fiches") app.innerHTML = renderFiches();
  else app.innerHTML = renderResult();
  bindEvents();
  if (state.screen === "fiches") bindFichesEvents();
}

  var m = {"rythme":"⚡","ischémie":"🫀","métabolique":"🧪","autre":"📐"};
  return m[cat] || "";
}
function diffColor(d) {
  return d==="facile"?"#ff4060":d==="moyen"?"#ffc840":"#ff3356";
}

function renderRevisionTab(st, counts, dueInFilter, filtered) {
  var p = [];

  // SR summary cards
  p.push('<div class="sr-summary">');
  var cards = [
    {n:dueInFilter, label:"À revoir", col:dueInFilter>0?"#ff3356":"#886050", icon:"🔴"},
    {n:st.fresh, label:"Nouveaux", col:"#ffc840", icon:"🆕"},
    {n:st.mastered, label:"Maîtrisés", col:"#ff4060", icon:"✅"},
    {n:ALL_CASES.length, label:"Total", col:"#ff6030", icon:"📚"}
  ];
  cards.forEach(function(s) {
    p.push('<div class="stat-card" style="border-color:' + s.col + '33">');
    p.push('<div class="stat-n" style="color:' + s.col + '">' + s.n + '</div>');
    p.push('<div class="stat-label">' + s.icon + ' ' + s.label + '</div>');
    p.push('</div>');
  });
  p.push('</div>');

  // Mode toggle
  p.push('<div class="mode-row">');
  p.push('<button class="mode-btn ' + (state.srMode?'active':'') + '" id="modeToggle">');
  p.push(state.srMode ? "🧠 Révision espacée ON" : "🎲 Mode aléatoire");
  p.push('</button>');
  if (state.srMode && dueInFilter > 0) {
    p.push('<span class="due-badge">● ' + dueInFilter + ' à revoir</span>');
  }
  p.push('</div>');

  // Filters
  p.push('<div class="filters">');
  var filterList = ["tous","rythme","ischemie","metabolique","autre"];
  filterList.forEach(function(f) {
    var fk = catKey(f);
    var col = f==="tous" ? "#ff6030" : catColor(fk);
    var n = f==="tous" ? ALL_CASES.length : (counts[fk]||0);
    var d = f==="tous" ? dueInFilter : ALL_CASES.filter(function(c){
      return c.cat===fk && (!state.srData[c.id]||state.srData[c.id].nextReview<=Date.now());
    }).length;
    var isActive = state.filter===f;
    var style = isActive ? ('border-color:'+col+';background:'+col+'22;color:'+col) : '';
    p.push('<button class="filter-btn ' + (isActive?'active':'') + '" data-filter="' + f + '" style="' + style + '">');
    p.push(f==="tous" ? "Tous" : (catIcon(fk)+' '+f.charAt(0).toUpperCase()+f.slice(1)));
    p.push(' <span style="opacity:0.7">(' + n + ')</span>');
    if (d>0) p.push('<span style="color:#ff3356;font-size:9px">●' + d + '</span>');
    p.push('</button>');
  });
  p.push('</div>');

  // Start button
  var btnLabel = state.srMode && dueInFilter>0 ? ("Réviser ("+dueInFilter+")") : state.srMode ? "Révision" : "Commencer";
  p.push('<button class="start-btn" id="startBtn"' + (filtered.length===0?' disabled':'') + '>▶ ' + btnLabel + '</button>');

  // Case grid
  p.push('<div class="case-grid-wrap">');
  p.push('<div class="section-label">CAS DISPONIBLES</div>');
  p.push('<div class="case-grid">');
  var listCases = state.filter==="tous" ? ALL_CASES : ALL_CASES.filter(function(c){ return c.cat===catKey(state.filter); });
  listCases.forEach(function(c) {
    var e = state.srData[c.id];
    var due = e && e.nextReview <= Date.now();
    var col = e ? (e.level>=4?"#ff4060":e.level>=2?"#ffc840":"#ff3356") : "#886050";
    var badge = e ? (due ? '<span style="color:'+col+'">◉ À revoir</span>' : '<span style="color:#886050">Niv.'+e.level+' ✓</span>') : '<span style="color:#886050">Nouveau</span>';
    var dc = diffColor(c.diff);
    var cc = catColor(c.cat);
    p.push('<div class="case-card" style="border-color:'+cc+'22">');
    p.push('<div class="case-title">' + h(c.short||c.title) + '</div>');
    p.push('<div class="case-meta">');
    p.push('<span class="diff-badge" style="background:'+dc+'22;color:'+dc+'">' + h(c.diff) + '</span>');
    p.push(badge);
    p.push('</div></div>');
  });
  p.push('</div></div>');
  return p.join('');
}

function renderStatsTab(st, counts) {
  var p = [];
  p.push('<div class="stats-page">');
  p.push('<div class="section-label">PROGRESSION GLOBALE</div>');
  p.push('<div class="global-stats">');
  var gst = [
    {label:"Maîtrisés", val:st.mastered, col:"#ff4060"},
    {label:"En cours", val:st.learning, col:"#ffc840"},
    {label:"Nouveaux", val:st.fresh, col:"#886050"}
  ];
  gst.forEach(function(s) {
    var pct = st.total>0 ? Math.round((s.val/st.total)*100) : 0;
    p.push('<div class="global-stat">');
    p.push('<div class="global-pct" style="color:'+s.col+'">'+pct+'%</div>');
    p.push('<div class="global-label">'+s.label+'</div>');
    p.push('<div style="font-size:10px;color:'+s.col+'">'+s.val+'/'+st.total+'</div>');
    p.push('</div>');
  });
  p.push('</div>');
  var mPct = st.total>0?(st.mastered/st.total)*100:0;
  var lPct = st.total>0?(st.learning/st.total)*100:0;
  p.push('<div class="progress-bar" style="margin-bottom:24px"><div style="height:100%;display:flex">');
  p.push('<div style="width:'+mPct+'%;background:#00f090;transition:width 0.6s"></div>');
  p.push('<div style="width:'+lPct+'%;background:#ffc840;transition:width 0.6s"></div>');
  p.push('</div></div>');

  p.push('<div class="section-label">PAR CATÉGORIE</div>');
  var catList = ["rythme","ischémie","métabolique","autre"];
  catList.forEach(function(cat) {
    var col = catColor(cat);
    var d = st.byCat[cat] || {attempts:0,correct:0,count:0,mastered:0,due:0};
    var sc = d.attempts>0 ? Math.round((d.correct/d.attempts)*100) : null;
    var wPct = d.count>0?(d.mastered/d.count)*100:0;
    var scol = sc===null?"#886050":sc>=80?"#ff4060":sc>=60?"#ffc840":"#ff3356";
    p.push('<div class="cat-stat-card" style="border-color:'+col+'22">');
    p.push('<div class="cat-stat-header">');
    p.push('<div class="cat-stat-left">');
    p.push('<span style="font-size:18px">'+catIcon(cat)+'</span>');
    p.push('<span style="font-weight:700;color:'+col+'">'+cat.charAt(0).toUpperCase()+cat.slice(1)+'</span>');
    p.push('<span style="font-size:9px;color:#886050">'+d.count+' cas</span>');
    p.push('</div>');
    p.push(sc!==null ? '<span style="font-size:22px;font-weight:900;color:'+scol+'">'+sc+'%</span>' : '<span style="color:#886050">—</span>');
    p.push('</div>');
    p.push('<div class="progress-bar" style="margin:8px 0 6px"><div style="height:100%;width:'+wPct+'%;background:'+col+';border-radius:3px;transition:width 0.6s"></div></div>');
    p.push('<div style="display:flex;justify-content:space-between;font-size:9px;color:#886050">');
    p.push('<span>✅ '+d.mastered+'/'+d.count+' maîtrisés</span>');
    if(d.due>0) p.push('<span style="color:#ff3356">● '+d.due+' à revoir</span>');
    if(d.attempts>0) p.push('<span>'+d.correct+'/'+d.attempts+' réponses</span>');
    p.push('</div></div>');
  });

  // Weak spots
  var weak = ALL_CASES.filter(function(c){
    return state.srData[c.id] && state.srData[c.id].attempts>=2 && state.srData[c.id].level<=1;
  }).sort(function(a,b){
    return ((state.srData[a.id]&&state.srData[a.id].level)||0)-((state.srData[b.id]&&state.srData[b.id].level)||0);
  }).slice(0,5);

  if (weak.length) {
    p.push('<div class="section-label" style="color:#ff3356;margin-top:16px">⚠ POINTS FAIBLES</div>');
    weak.forEach(function(c) {
      var e = state.srData[c.id];
      var pct = Math.round((e.correct/e.attempts)*100);
      p.push('<div class="weak-card">');
      p.push('<span style="font-size:14px">'+catIcon(c.cat)+'</span>');
      p.push('<div style="flex:1;min-width:0"><div style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+h(c.title)+'</div>');
      p.push('<div style="font-size:9px;color:#886050">Niv.'+e.level+'/5 · '+e.correct+'/'+e.attempts+'</div></div>');
      p.push('<div class="pct-circle">'+pct+'%</div>');
      p.push('</div>');
    });
  }

  if (st.total > st.fresh) {
    p.push('<div id="resetConfirm" style="margin-top:16px">');
    p.push('<button class="reset-btn" id="resetBtn">🔄 Réinitialiser la progression</button>');
    p.push('</div>');
  }
  p.push('</div>');
  return p.join('');
}

// ─── QUIZ ─────────────────────────────────────────────────────────────────────
function renderQuiz() {
  var c = state.current;
  if (!c) return '';
  var catCol = catColor(c.cat);
  var prog = state.history.length / (state.history.length + state.queue.length + 1);
  var e = state.srData[c.id];
  var dc = diffColor(c.diff);
  var correct = state.selected === c.ok;

  var p = [];
  p.push('<div class="page quiz-page">');
  p.push('<div class="topbar">');
  p.push('<button class="back-btn" id="backBtn">← Accueil</button>');
  p.push('<span class="topbar-title">ECG TRAINER</span>');
  p.push('<span style="font-size:11px;color:#886050">'+(state.history.length+1)+'/'+(state.history.length+state.queue.length+1)+'</span>');
  p.push('</div>');
  p.push('<div class="progress-track"><div class="progress-fill" style="width:'+(prog*100)+'%"></div></div>');
  p.push('<div class="quiz-scroll">');

  // Badges
  p.push('<div class="badges-row">');
  p.push('<span class="badge" style="background:'+dc+'22;color:'+dc+'">'+h((c.diff||'').toUpperCase())+'</span>');
  p.push('<span class="badge" style="background:'+catCol+'22;color:'+catCol+'">'+catIcon(c.cat)+' '+h((c.cat||'').toUpperCase())+'</span>');
  if(e) p.push('<span class="badge" style="background:#2a1212;color:#886050">Niv.'+e.level+'/5 · '+e.correct+'/'+e.attempts+'</span>');
  p.push('<span style="font-size:9px;color:#886050;padding:2px 8px;background:#2a1212;border-radius:10px">#'+h(String(c.id))+'</span>');
  p.push('<span style="font-size:10px;color:#886050;margin-left:auto">✓'+state.score.ok+' ✗'+(state.score.total-state.score.ok)+'</span>');
  p.push('</div>');

  // Clinical context
  if (c.context) {
    p.push('<div class="clinical-context">');
    p.push('<span class="context-label">📋 Contexte</span>');
    p.push('<span class="context-text">' + h(c.context) + '</span>');
    p.push('</div>');
  }
  // ECG strip - multi-lead (skip for text cases)
  var leads = (c.type === "text") ? [] : getLeads(c);
  p.push('<div class="ecg-box">');
  p.push('<span class="ecg-label">● 25mm/s · 10mm/mV</span>');
  leads.forEach(function(ld, li) {
    var lpath = (ECG_SHAPES[ld.shape] || ECG_SHAPES.sinus)();
    p.push('<div class="strip-row">');
    p.push('<div class="lead-label">'+h(ld.lead)+'</div>');
    p.push('<svg viewBox="0 0 800 120" class="strip-svg" preserveAspectRatio="none">');
    p.push('<defs><pattern id="g'+li+'" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a0c0c" stroke-width="0.4"/></pattern></defs>');
    p.push('<rect width="800" height="120" fill="#150a0a"/>');
    p.push('<rect width="800" height="120" fill="url(#g'+li+')"/>');
    p.push('<line x1="0" y1="60" x2="800" y2="60" stroke="#1a0c0c" stroke-width="0.8" stroke-dasharray="3,12"/>');
    p.push('<path d="'+lpath+'" fill="none" stroke="#ff4060" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>');
    p.push('</svg></div>');
  });
  p.push('</div>');

  p.push('<div class="question">' + h(c.question || 'Quel est ce diagnostic ECG ?') + '</div>');
  p.push('<div class="opts">');
  (c.opts||[]).forEach(function(opt, idx) {
    var style, icon='';
    if (!state.showResult) {
      style = 'background:transparent;border:1px solid #2a1212;color:#d0e8ff';
    } else if (idx===c.ok) {
      style = 'background:#00f09018;border:1px solid #00f090;color:#00f090'; icon='✓';
    } else if (idx===state.selected) {
      style = 'background:#ff335618;border:1px solid #ff3356;color:#ff3356'; icon='✗';
    } else {
      style = 'background:transparent;border:1px solid #2a1212;color:#886050';
    }
    p.push('<button class="opt-btn" data-idx="'+idx+'" style="'+style+'">');
    p.push('<span class="opt-letter">'+String.fromCharCode(65+idx)+'</span>');
    p.push('<span style="flex:1">'+h(opt)+'</span>');
    if(icon) p.push('<span>'+icon+'</span>');
    p.push('</button>');
  });
  p.push('</div>');

  p.push('<div class="action-row">');
  if(!state.showResult) p.push('<button class="hint-btn" id="hintBtn">💡 '+(state.showHint?'Masquer':'Indice')+'</button>');
  if(state.showResult) p.push('<button class="keys-btn" id="keysBtn">🔍 '+(state.showKeys?'Masquer':'Critères')+'</button>');
  p.push('</div>');
  if(state.showResult && !correct && c.wrong && c.wrong[state.selected] !== undefined) {
    p.push('<div class="wrong-explain">');
    p.push('<span class="wrong-label">💡 Pourquoi pas cette réponse ?</span>');
    p.push('<span class="wrong-text">' + h(c.wrong[state.selected]) + '</span>');
    p.push('</div>');
  }

  if(state.showHint && !state.showResult) {
    p.push('<div class="hint-box">💡 '+h(c.hint)+'</div>');
  }

  if(state.showResult) {
    var rCol = correct?'#ff4060':'#ff3356';
    p.push('<div class="result-box" style="background:'+rCol+'18;border:1px solid '+rCol+'44">');
    p.push('<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px">');
    p.push('<div style="font-weight:700;color:'+rCol+'">'+(correct?'✓ Correct !':'✗ C\'était : '+h(c.answer))+'</div>');
    if(e) {
      var newLv = srUpdate({},c.id,correct);
      // just show the direction
      p.push('<div style="font-size:9px;color:#886050">'+(correct?'↑ Niveau':'↓ Niveau')+'</div>');
    }
    p.push('</div>');
    p.push('<div style="font-size:11px;color:#886050;line-height:1.8">'+h(c.desc)+'</div>');
    p.push('</div>');
  }

  if(state.showKeys && state.showResult) {
    p.push('<div class="keys-box">');
    p.push('<div class="section-label" style="margin-bottom:8px;text-align:left">CRITÈRES DIAGNOSTIQUES</div>');
    (c.keys||[]).forEach(function(k){
      p.push('<div class="key-item"><span style="color:#ff6030;flex-shrink:0">▸</span>'+h(k)+'</div>');
    });
    p.push('</div>');
  }

  if(state.showResult) {
    p.push('<button class="next-btn" id="nextBtn">'+(state.queue.length===0?'Voir les résultats →':'Cas suivant →')+'</button>');
  }

  p.push('</div></div>');
  return p.join('');
}

// ─── RESULT ───────────────────────────────────────────────────────────────────
function renderResult() {
  var pct = Math.round((state.score.ok/state.score.total)*100);
  var gc = pct>=80?"#ff4060":pct>=60?"#ffc840":"#ff3356";
  var gt = pct>=80?"Expert !":pct>=60?"Bien joué":"À retravailler";
  var st = srStats(state.srData, ALL_CASES);
  var p = [];

  p.push('<div class="page result-page">');
  p.push('<div style="font-size:9px;letter-spacing:6px;color:#ff6030;margin-bottom:12px">◈ SESSION TERMINÉE ◈</div>');
  p.push('<div style="font-size:68px;font-weight:900;color:'+gc+'">'+pct+'%</div>');
  p.push('<div style="font-size:18px;color:'+gc+';margin-bottom:4px">'+gt+'</div>');
  p.push('<div style="font-size:12px;color:#886050;margin-bottom:20px">'+state.score.ok+'/'+state.score.total+' bonnes réponses</div>');

  p.push('<div style="display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;justify-content:center">');
  var res = [
    {n:state.score.ok, label:"Niveau ↑", col:"#ff4060"},
    {n:state.score.total-state.score.ok, label:"À retravailler", col:"#ff3356"},
    {n:st.due, label:"Révisions dues", col:"#ffc840"}
  ];
  res.forEach(function(s){
    p.push('<div class="mini-stat" style="border-color:'+s.col+'33">');
    p.push('<div style="font-size:22px;font-weight:900;color:'+s.col+'">'+s.n+'</div>');
    p.push('<div style="font-size:9px;color:#886050">'+s.label+'</div>');
    p.push('</div>');
  });
  p.push('</div>');

  p.push('<div class="history-list">');
  state.history.forEach(function(item){
    var hc = item.ok?"#00f09040":"#ff335640";
    var tc = item.ok?"#ff4060":"#ff3356";
    p.push('<div class="history-item" style="border-color:'+hc+'">');
    p.push('<span style="font-size:16px;color:'+tc+'">'+(item.ok?'✓':'✗')+'</span>');
    p.push('<div style="flex:1;min-width:0">');
    p.push('<div style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+h(item.case.title)+'</div>');
    if(!item.ok) p.push('<div style="font-size:9px;color:#886050">→ '+h(item.case.answer)+'</div>');
    p.push('</div>');
    p.push('<div style="font-size:10px;color:'+catColor(item.case.cat)+';flex-shrink:0">'+catIcon(item.case.cat)+'</div>');
    p.push('</div>');
  });
  p.push('</div>');

  p.push('<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">');
  p.push('<button class="btn-outline-accent" id="statsBtn">📊 Stats</button>');
  p.push('<button class="btn-outline-dim" id="homeBtn">← Accueil</button>');
  p.push('<button class="btn-primary" id="replayBtn">↺ Continuer</button>');
  p.push('</div></div>');
  return p.join('');
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
function bindEvents() {
  document.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.onclick = function(){ state.tab = btn.dataset.tab; render(); };
  });
  document.querySelectorAll('.filter-btn').forEach(function(btn){
    btn.onclick = function(){ state.filter = btn.dataset.filter; render(); };
  });
  var el;
  el = document.getElementById('modeToggle');
  if(el) el.onclick = function(){ state.srMode = !state.srMode; render(); };
  el = document.getElementById('startBtn');
  if(el) el.onclick = startQuiz;
  el = document.getElementById('btnQuiz');
  if(el) el.onclick = startTextQuiz;
  el = document.getElementById('btnFiches');
  if(el) el.onclick = function(){ ficheState.activeFiche=null; state.screen='fiches'; render(); };
  el = document.getElementById('backBtn');
  if(el) el.onclick = function(){ state.screen='home'; render(); };
  document.querySelectorAll('.opt-btn').forEach(function(btn){
    btn.onclick = function(){ answer(parseInt(btn.dataset.idx)); };
  });
  el = document.getElementById('hintBtn');
  if(el) el.onclick = function(){ state.showHint = !state.showHint; render(); };
  el = document.getElementById('keysBtn');
  if(el) el.onclick = function(){ state.showKeys = !state.showKeys; render(); };
  el = document.getElementById('nextBtn');
  if(el) el.onclick = next;
  el = document.getElementById('statsBtn');
  if(el) el.onclick = function(){ state.screen='home'; state.tab='stats'; render(); };
  el = document.getElementById('homeBtn');
  if(el) el.onclick = function(){ state.screen='home'; render(); };
  el = document.getElementById('replayBtn');
  if(el) el.onclick = startQuiz;
  el = document.getElementById('homeBtnFiches');
  if(el) el.onclick = function(){ ficheState.activeFiche=null; state.screen='home'; render(); };
  el = document.getElementById('fichesHomeBtn');
  if(el) el.onclick = function(){ ficheState.activeFiche=null; state.screen='fiches'; render(); };
  el = document.getElementById('resetBtn');
  if(el) el.onclick = function(){
    var div = document.getElementById('resetConfirm');
    div.innerHTML = '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span style="font-size:10px;color:#ff3356">Tout effacer ?</span><button id="confirmYes" style="padding:4px 12px;background:#ff335522;border:1px solid #ff3356;border-radius:14px;color:#ff3356;cursor:pointer;font-family:inherit;font-size:10px">Oui</button><button id="confirmNo" style="padding:4px 12px;background:transparent;border:1px solid #88605044;border-radius:14px;color:#886050;cursor:pointer;font-family:inherit;font-size:10px">Annuler</button></div>';
    document.getElementById('confirmYes').onclick = function(){ state.srData={}; srSave({}); render(); };
    document.getElementById('confirmNo').onclick = function(){ render(); };
  };
}

// ─── QUIZ ACTIONS ─────────────────────────────────────────────────────────────
function startQuiz() {
  var filtered = getFiltered();
  var pool = state.srMode ? srQueue(filtered, state.srData) : filtered.slice().sort(function(){ return Math.random()-0.5; });
  if (!pool.length) return;
  state.current = pool[0];
  state.queue = pool.slice(1);
  state.selected = null;
  state.showResult = false;
  state.showHint = false;
  state.showKeys = false;
  state.score = {ok:0, total:0};
  state.history = [];
  state.screen = 'quiz';
  render();
}

function answer(idx) {
  if (state.showResult) return;
  var ok = idx === state.current.ok;
  state.selected = idx;
  state.showResult = true;
  if(ok) state.score.ok++;
  state.score.total++;
  state.history.push({case: state.current, idx:idx, ok:ok});
  state.srData = srUpdate(state.srData, state.current.id, ok);
  srSave(state.srData);
  render();
}

function next() {
  if (!state.queue.length) { state.screen='result'; render(); return; }
  state.current = state.queue[0];
  state.queue = state.queue.slice(1);
  state.selected = null;
  state.showResult = false;
  state.showHint = false;
  state.showKeys = false;
  render();
}

render();

  </script>
</body>
